<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0c29"/>
      <stop offset="50%" style="stop-color:#302b63"/>
      <stop offset="100%" style="stop-color:#24243e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#48bfe3"/>
      <stop offset="100%" style="stop-color:#52b788"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bg)"/>

  <!-- Decorative circles -->
  <circle cx="200" cy="320" r="180" fill="none" stroke="#48bfe3" stroke-width="1" opacity="0.15"/>
  <circle cx="200" cy="320" r="220" fill="none" stroke="#48bfe3" stroke-width="0.5" opacity="0.1"/>
  <circle cx="1080" cy="500" r="150" fill="none" stroke="#52b788" stroke-width="1" opacity="0.15"/>

  <!-- Frog icon -->
  <g transform="translate(140, 220)" filter="url(#glow)">
    <circle cx="60" cy="60" r="55" fill="#52b788" opacity="0.9"/>
    <circle cx="40" cy="45" r="12" fill="white"/>
    <circle cx="80" cy="45" r="12" fill="white"/>
    <circle cx="42" cy="45" r="6" fill="#1a1a2e"/>
    <circle cx="82" cy="45" r="6" fill="#1a1a2e"/>
    <ellipse cx="60" cy="72" rx="18" ry="8" fill="#3a9d6e"/>
    <path d="M 42 72 Q 60 85 78 72" fill="none" stroke="#1a1a2e" stroke-width="2"/>
  </g>

  <!-- Title -->
  <text x="300" y="280" font-family="system-ui, -apple-system, sans-serif" font-size="96" font-weight="800" fill="white" filter="url(#glow)">TADPOLE</text>
  <text x="302" y="350" font-family="system-ui, -apple-system, sans-serif" font-size="28" fill="#48bfe3" letter-spacing="4">YOUR BG3 COMPANION</text>

  <!-- Divider line -->
  <rect x="300" y="370" width="200" height="3" rx="2" fill="url(#accent)"/>

  <!-- Subtitle -->
  <text x="300" y="410" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="#7a8ba8">Live game sync for Steam Deck + Phone</text>
  <text x="300" y="440" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="#7a8ba8">HP bars, combat tracking, party management</text>

  <!-- Feature badges -->
  <g transform="translate(300, 480)">
    <rect width="140" height="36" rx="18" fill="#48bfe3" opacity="0.15"/>
    <rect x="1" y="1" width="138" height="34" rx="17" fill="none" stroke="#48bfe3" stroke-width="1" opacity="0.3"/>
    <text x="70" y="23" font-family="monospace" font-size="13" fill="#48bfe3" text-anchor="middle">Steam Deck</text>
  </g>
  <g transform="translate(460, 480)">
    <rect width="120" height="36" rx="18" fill="#52b788" opacity="0.15"/>
    <rect x="1" y="1" width="118" height="34" rx="17" fill="none" stroke="#52b788" stroke-width="1" opacity="0.3"/>
    <text x="60" y="23" font-family="monospace" font-size="13" fill="#52b788" text-anchor="middle">Phone App</text>
  </g>
  <g transform="translate(600, 480)">
    <rect width="100" height="36" rx="18" fill="#f4a261" opacity="0.15"/>
    <rect x="1" y="1" width="98" height="34" rx="17" fill="none" stroke="#f4a261" stroke-width="1" opacity="0.3"/>
    <text x="50" y="23" font-family="monospace" font-size="13" fill="#f4a261" text-anchor="middle">Decky</text>
  </g>

  <!-- Phone mockup hint -->
  <g transform="translate(950, 160)">
    <rect width="180" height="320" rx="20" fill="none" stroke="#48bfe3" stroke-width="2" opacity="0.4"/>
    <rect x="10" y="40" width="160" height="240" rx="4" fill="#16213e" opacity="0.6"/>
    <!-- HP bars mockup -->
    <rect x="25" y="60" width="130" height="8" rx="4" fill="#0d0d1a"/>
    <rect x="25" y="60" width="104" height="8" rx="4" fill="#52b788"/>
    <rect x="25" y="80" width="130" height="6" rx="3" fill="#0d0d1a"/>
    <rect x="25" y="80" width="78" height="6" rx="3" fill="#f4a261"/>
    <rect x="25" y="96" width="130" height="6" rx="3" fill="#0d0d1a"/>
    <rect x="25" y="96" width="26" height="6" rx="3" fill="#e76f51"/>
    <!-- Status text mockup -->
    <rect x="25" y="120" width="60" height="4" rx="2" fill="#48bfe3" opacity="0.4"/>
    <rect x="25" y="135" width="90" height="4" rx="2" fill="#7a8ba8" opacity="0.3"/>
    <rect x="25" y="148" width="75" height="4" rx="2" fill="#7a8ba8" opacity="0.3"/>
    <!-- Combat badge -->
    <rect x="25" y="170" width="60" height="20" rx="10" fill="#e76f51" opacity="0.3"/>
    <rect x="26" y="171" width="58" height="18" rx="9" fill="none" stroke="#e76f51" stroke-width="1" opacity="0.5"/>
    <text x="55" y="184" font-family="monospace" font-size="10" fill="#e76f51" text-anchor="middle">COMBAT</text>
    <!-- Home indicator -->
    <rect x="60" y="295" width="60" height="4" rx="2" fill="#48bfe3" opacity="0.3"/>
  </g>
</svg>