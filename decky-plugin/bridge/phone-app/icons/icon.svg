<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Dark background -->
  <rect width="512" height="512" rx="96" fill="#0a0a0a"/>

  <!-- Tadpole silhouette: oval head + wavy tail -->
  <g transform="translate(256, 256)">
    <!-- Head: large oval centered slightly left -->
    <ellipse cx="-20" cy="0" rx="72" ry="60" fill="white"/>

    <!-- Eye: purple accent dot -->
    <circle cx="-42" cy="-14" r="12" fill="#a855f7"/>

    <!-- Tail: smooth wavy curve extending to the right -->
    <path d="
      M 48,-8
      C 68,-40  110,-60  140,-40
      C 170,-20  170,20   150,36
      C 130,52   100,40   90,20
    " fill="none" stroke="white" stroke-width="16" stroke-linecap="round"/>
  </g>
</svg>
